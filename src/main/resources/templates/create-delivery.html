<style>
   .form-container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      max-width: 500px;
      margin: 50px auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }
    input, select {
      width: 100%;
      padding: 12px;
      margin: 10px 0 20px 0;
      border: 1px solid #ddd;
      border-radius: 6px;
      box-sizing: border-box;
    }
    .btn-submit {
      background: #007bff;
      color: white;
      border: none;
      padding: 15px;
      width: 100%;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

</style>
<body>
    <div class="form-container">
        <h2>Book a New Delivery</h2>
        
        <form th:action="@{/api/deliveries/create}" th:object="${delivery}" method="post">
            
            <div th:if="${session.loggedInUser != null and session.loggedInUser.role == 'ADMIN'}">
                 <label>Select Sender (Customer):</label>
                 <select th:field="*{sender}" required>
                     <option value="" disabled selected>-- Choose a User --</option>
                     <option th:each="user : ${users}" 
                             th:value="${user.id}" 
                             th:text="${user.name + ' (' + user.email + ')'}">
                     </option>
                 </select>
            </div>
            <div class="mb-3">
                <label>Receiver Name:</label>
                <input type="text" th:field="*{receiverName}" class="form-control" placeholder="Who is receiving the parcel?" required>
            </div>

            <div class="mb-3">
                <label>Receiver Phone:</label>
                <input type="text" th:field="*{receiverPhone}" class="form-control" placeholder="Receiver's contact number" required>
            </div>
            <div th:if="${session.loggedInUser.role != 'ADMIN'}">
                 <label>Sender:</label>
                 <p><strong th:text="${session.loggedInUser.name}"></strong> (Logged in User)</p>
                 <input type="hidden" name="sender" th:value="${session.loggedInUser.id}" />
            </div>
            <div class="form-group">
                <label>Parcel Weight (kg):</label>
                <input type="number" step="0.1" th:field="*{weight}" class="form-control" required placeholder="e.g. 5.5">
            </div>
            <label>Assign Driver:</label>
            <select th:field="*{driver}" required>
                <option value="" disabled selected>-- Select a Driver --</option>
                <th:block th:if="${drivers != null}">
                    <option th:each="d : ${drivers}" 
                            th:value="${d.id}" 
                            th:text="${d.name}">
                    </option>
                </th:block>
            </select>
            
            <label>Order Date & Time:</label>
            <input type="datetime-local" th:field="*{orderDate}" required>
           
            <label>Pickup Address:</label>
            <input type="text" th:field="*{pickupAddress}" placeholder="Enter pickup location" required>
                   
            <label>Delivery Address:</label>
            <input type="text" th:field="*{deliveryAddress}" placeholder="Enter destination" required>

            <button type="submit" class="btn-submit">Create Delivery</button>
            
            <div style="margin-top: 15px; text-align: center;">
                <a href="/api/deliveries/dashboard" style="color: #666; text-decoration: none; font-size: 14px;">← Back to Dashboard</a>
            </div>
        </form>
    </div>
</body>
