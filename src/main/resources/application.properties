server.port=8083

spring.application.name=courierAppp
spring.sql.init.mode=always
## 1. Database Connection Settings
#spring.datasource.url=jdbc:h2:mem:courierDB
#spring.datasource.driverClassName=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=
#

spring.datasource.url=jdbc:oracle:thin:@localhost:1521/xe
spring.datasource.username=SYSTEM
spring.datasource.password=Oracle@123
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
# Use the specific Dialect for older Oracle versions
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# This tells Hibernate to use Sequences instead of Identity columns
# which is required for Oracle 10g/11g
spring.jpa.properties.hibernate.id.db_structure_naming_strategy=single
